<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Realizado - Mark Tech</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700;800;900&family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Background -->
    <div class="tech-background">
        <div class="base-image-layer"></div>
        <div class="smoke-layer">
            <div class="smoke smoke-1"></div>
            <div class="smoke smoke-2"></div>
            <div class="smoke smoke-3"></div>
        </div>
        <div class="neural-network" id="neuralNetwork"></div>
        <div class="particle-field"></div>
        <div class="grid-overlay"></div>
        <div class="gradient-orbs"></div>
    </div>

    <!-- Header -->
    <header class="nav-header">
        <nav class="nav-container">
            <div class="brand">
                <span class="brand-black">Mark</span><span class="brand-neon">tech</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">← Voltar</a>
                <a href="meus-pedidos.html" class="nav-link">Meus Pedidos</a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="order-section">
        <div class="section-container">
            <div class="success-message" style="display: block; text-align: center; padding: 4rem 2rem;">
                <div class="success-content">
                    <div class="success-icon" style="font-size: 5rem; color: #00FF7F; margin-bottom: 2rem;">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <h3 style="font-size: 2.5rem; color: #00FF7F; margin-bottom: 1rem;">Pedido Realizado com Sucesso!</h3>
                    <p style="font-size: 1.2rem; color: rgba(255, 255, 255, 0.8); margin-bottom: 2rem;">
                        Seu pedido foi recebido e será analisado pela nossa equipe.
                    </p>
                    <button onclick="window.location.href='meus-pedidos.html'" class="premium-btn primary large">
                        Ver Meus Pedidos
                    </button>
                    <button onclick="window.location.href='index.html'" class="premium-btn large" style="margin-left: 1rem;">
                        Voltar ao Início
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="neural-network.js"></script>
</body>
</html>
