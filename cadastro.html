<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark tech - Cadastro</title>
    <base href="./">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@300;400;500;600;700;800;900&family=Chakra+Petch:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Esconder navbar apenas nesta página */
        .nav-header {
            display: none !important;
        }
        
        /* Centralização perfeita do card */
        .cadastro-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0;
            overflow: hidden;
        }
        
        /* Refinamento do card */
        .cadastro-box {
            background: linear-gradient(145deg, #1a1a1a 0%, #0f0f0f 100%);
            border-radius: 24px;
            border: 2px solid rgba(0, 255, 136, 0.4);
            padding: 3rem 2.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            transform-style: preserve-3d;
            will-change: transform;
            max-width: 420px;
            width: 90%;
        }
        
        .cadastro-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, 
                rgba(0, 255, 136, 0.05) 0%, 
                transparent 50%, 
                rgba(0, 136, 255, 0.03) 100%);
            opacity: 0.9;
        }
        
        .cadastro-box:hover {
            transform: perspective(1200px) rotateY(0deg) rotateX(0deg) scale(1.02);
            box-shadow: 
                0 40px 120px rgba(0, 0, 0, 0.8),
                0 0 40px rgba(0, 255, 136, 0.25),
                0 0 80px rgba(0, 255, 136, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border-color: rgba(0, 255, 136, 0.6);
        }
        
        .cadastro-title {
            font-size: 2.2rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 1.5rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.15);
            position: relative;
            z-index: 1;
        }
        
        .cadastro-subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.75);
            margin-bottom: 2.5rem;
            line-height: 1.6;
            font-weight: 400;
            position: relative;
            z-index: 1;
        }
        
        .google-btn {
            width: 100%;
            padding: 16px 24px;
            border: 1px solid rgba(0, 255, 136, 0.6);
            background: transparent;
            color: var(--neon-green);
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            z-index: 1;
        }
        
        .google-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.1), transparent);
            transition: left 0.6s ease;
        }
        
        .google-btn:hover {
            background: rgba(0, 255, 136, 0.08);
            border-color: var(--neon-green);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.25);
        }
        
        .google-btn:hover::before {
            left: 100%;
        }
        
        .google-btn i {
            font-size: 1.1rem;
        }
        
        /* Partículas sutis no fundo */
        .cadastro-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .cadastro-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(0, 255, 136, 0.3);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(0, 255, 136, 0.2);
            animation: particleFloat 20s linear infinite;
        }
        
        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .cadastro-box {
                padding: 2rem 1.5rem;
                width: 95%;
            }
            
            .cadastro-title {
                font-size: 1.8rem;
            }
            
            .cadastro-subtitle {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- ========== DIVISÃO 0: BACKGROUND (FUNDO ANIMADO) ========== -->
    <div class="tech-background">
        <!-- Base Image Layer - FUNDO.png (locked, untouched) -->
        <div class="base-image-layer"></div>
        
        <!-- Green Neon Smoke Layer - Continuous Animation -->
        <div class="smoke-layer smoke-1"></div>
        <div class="smoke-layer smoke-2"></div>
        <div class="smoke-layer smoke-3"></div>
        
        <!-- Tech Background Container -->
        <div class="tech-bg-container">
            <div class="tech-particles"></div>
            <div class="tech-grid"></div>
        </div>
    </div>

    <!-- ========== DIVISÃO CADASTRO ========== -->
    <section class="cadastro-section">
        <!-- Partículas sutis no fundo -->
        <div class="cadastro-particles" id="cadastroParticles"></div>
        
        <div class="cadastro-container">
            <div class="cadastro-box">
                <h2 class="cadastro-title">Bem-vindo ao Mark Tech</h2>
                <p class="cadastro-subtitle">Comece sua jornada tecnológica</p>
                
                <button class="google-btn" id="googleLoginBtn">
                    <i class="fab fa-google"></i>
                    Continuar com Google
                </button>
            </div>
        </div>
    </section>

    <!-- Script de Login Simulado e Partículas -->
    <script>
        // Criar partículas animadas
        function createParticles() {
            const particlesContainer = document.getElementById('cadastroParticles');
            const particleCount = 15;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'cadastro-particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }
        
        // Inicializar partículas quando carregar a página
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
        });
    </script>
    
    <script type="module" src="auth.js"></script>
    <script src="route-fallback.js"></script>
    <script src="script.js"></script>
    <script>
        // Inicializar partículas
        document.addEventListener('DOMContentLoaded', function() {
            initializeParticles();
        });
        
        function initializeParticles() {
            const particlesContainer = document.querySelector('.cadastro-particles');
            if (!particlesContainer) return;
            
            const particleCount = 15;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'cadastro-particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }
        
        // Redirecionamento automático após login
        document.addEventListener('DOMContentLoaded', function() {
            // Verificar a cada 500ms se usuário fez login
            const checkLoginInterval = setInterval(() => {
                // Tentar acessar auth global (disponível via auth.js)
                const auth = window.auth || (window.marktechAuth && window.marktechAuth.auth);
                const pacote = localStorage.getItem("pacoteSelecionado");
                
                if (auth && auth.currentUser && pacote) {
                    // Usuário logado e pacote selecionado - redirecionar
                    clearInterval(checkLoginInterval);
                    localStorage.removeItem("pacoteSelecionado");
                    
                    // Mapear pacotes para páginas corretas
                    const paginaMap = {
                        'basico': 'pedido-basico.html',
                        'intermediario': 'pedido-intermediario.html', 
                        'avancado': 'pedido-avancado.html'
                    };
                    
                    const pagina = paginaMap[pacote] || 'pedido-basico.html';
                    console.log('Redirecionando para pacote:', pacote, 'página:', pagina);
                    window.location.href = `${pagina}?pacote=${pacote}`;
                }
            }, 500);
            
            // Limpar interval após 30 segundos para evitar loops
            setTimeout(() => {
                clearInterval(checkLoginInterval);
            }, 30000);
        });
    </script>
</body>
</html>
